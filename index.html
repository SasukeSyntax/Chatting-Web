<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Time!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Crafty+Girls&family=Croissant+One&family=Doto:wght@100..900&family=DynaPuff:wght@400..700&family=Gajraj+One&family=Goldman:wght@400;700&family=Handjet:wght,ELSH@100..900,2&family=Major+Mono+Display&family=Playwrite+NZ+Guides&family=Rationale&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sarpanch:wght@400;500;600;700;800;900&family=Shadows+Into+Light+Two&family=Spicy+Rice&family=Wendy+One&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div  id="welcome-screen">
        <h1 id="yo-twin">
            Yo twin, whats your nickname?
        </h1>
        <input type="text" id="nickname-input" placeholder="Type it here twin.." autocomplete="off">
        <button id="enter-btn">Enter Chat</button>
    </div>

    <div id="chat-screen" style="display: none;">
        <h2 id="welcome-message">
            Hellow twin!
        </h2>
        <div id="messages"></div>
        <div id="input-bt-combo">
            <input type="text" id="message-input" placeholder="Type a message twin..">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
